name = "tier2tickets-relay"
main = "src/index.ts"
compatibility_date = "2024-11-27"
compatibility_flags = ["nodejs_compat"]

# Workers Logs: capture console.log/console.warn in the dashboard for debugging.
# Source-level logging is silent by default — only non-PII breadcrumbs are emitted;
# full request/response bodies require DEBUG_LOGS=true (see src/log.ts).
[observability.logs]
enabled = true
# invocation_logs capture per-request metadata (method, path, status, timing, CF
# headers) at the PLATFORM level, REGARDLESS of the source-level silence above.
# Left ENABLED deliberately (audit F4): disabling it would blind ops to request
# volume/latency/errors. This is a conscious operator decision for a PHI-adjacent
# service — set invocation_logs=false if request-metadata retention is unacceptable,
# and/or lower head_sampling_rate below to retain only a fraction of invocations.
invocation_logs = true
# Fraction of invocations whose logs are retained (0.0–1.0). 1.0 = keep all.
# Lower it to reduce retained request metadata (another conscious ops decision).
head_sampling_rate = 1.0

# Two crons (differentiated in src/index.ts `scheduled` by `event.cron`):
#   "0 */6 * * *"  refreshes the D1 mirror of Gorelo agents/clients (idempotent syncAll).
#   "*/5 * * * *"  flushes orphaned deferred tickets — a press whose /actions note never
#                  arrived — creating them note-less after the PENDING_GRACE_MS window.
[triggers]
crons = ["0 */6 * * *", "*/5 * * * *"]

# Location fetches have no bulk Gorelo endpoint, so they're one call per client.
# Doing all of them inline blows the Worker's 50 external-subrequest/invocation
# cap (free plan) at scale, so syncAll enqueues one message per client here and a
# queue consumer fetches locations in small batches — each consumer invocation
# gets its own subrequest budget. Queues are on the free plan (10k ops/day).
[[queues.producers]]
binding = "SYNC_QUEUE"
queue = "tier2tickets-sync"

[[queues.consumers]]
queue = "tier2tickets-sync"
# <=10 clients per batch -> <=10 location fetches per invocation, well under 50.
max_batch_size = 10
max_batch_timeout = 10
# Per-message retry with backoff replaces the hand-rolled fetch retry loop for
# locations; give a rate-limited client a few tries before giving up this cycle.
max_retries = 3

[vars]
# US: https://api.usw.gorelo.io   AU: https://api.aue.gorelo.io
GORELO_BASE_URL = "https://api.usw.gorelo.io"

# When "true" (default), only the source IPs of the enabled products below (matched
# via CF-Connecting-IP) may POST tickets. "false"/"0"/"" disables the allowlist.
ENFORCE_IP_ALLOWLIST = "true"

# Per-product allowlist toggles. "true" enables that product's source IPs/CIDR
# ranges (matched via CF-Connecting-IP); any other value disables. Product keys
# and IPs live in src/products.ts (PRODUCTS). An unset flag falls back to the
# product's built-in default: tier2 on (backward-compatible), huntress off (opt-in).
# NOTE: enabling a product is only the IP doorman — the ticket-building path is
# still Tier2/Helpdesk-Buttons-shaped, so a newly enabled product needs its own
# field handling before its requests produce correct Gorelo tickets.
ENABLE_TIER2 = "true"
ENABLE_HUNTRESS = "true"

# --- Gorelo IDs: fill these from scripts/gorelo-ids.sh (values below are from the live Salient tenant) ---
# groupId / typeId / priorityId / sourceId are NON-NULLABLE on CreatePublicTicketCommand
# and must always be sent, so these have no safe zero-default.
#
# Groups (from the Gorelo UI): 2051 "Everyone" (general help queue, help@salientmsp.com),
# 2052 "Escalations", 4084 "Security". Button presses go to the general queue.
# (GET /v1/organization/groups returns 403 for this key — the Worker never calls it at
# runtime, so no scope change is needed; the id below was taken from the UI.)
DEFAULT_GROUP_ID = "2051"

# GET /v1/tickets/types -> 7045 "Incident" (unplanned interruption; fits a button press).
# Alternatives: 7046 Request, 7047 Proactive, 7048 Internal, 8412 Outage. (7045 confirmed accepted.)
DEFAULT_TYPE_ID = "7045"

# GET /v1/tickets/statuses -> 1 "New". REQUIRED by Gorelo's validator: a create WITHOUT
# statusId returns HTTP 400 (confirmed by testing), even though the swagger marks it nullable.
DEFAULT_STATUS_ID = "1"

# PublicTicketPriority enum = [0,1,2,3,4]. Ships WITHOUT labels in the spec.
# TODO(verify): confirm which int is your desired default priority in the Gorelo UI. 2 = a middle default.
DEFAULT_PRIORITY = "2"

# TicketSource enum = [1,2,3,4,5,6]. 6 = the API/integration source (Gorelo tags these with a
# cog icon); confirmed accepted by the create endpoint.
DEFAULT_SOURCE = "6"

# Fallback client when no machine/domain match is found.
# GET /v1/clients -> 15567 "Salient MSP" (isDefault:true) — unmatched presses land on the
# MSP's own default client with a triage note for a tech to reassign.
CATCHALL_CLIENT_ID = "15567"

# Gorelo tag applied to every Helpdesk Buttons ticket (tagIds on the create command).
# 31974 "Submitted VIA HDB" — lets you filter/report on HDB-originated tickets. This is
# a TAG (not a ticket type; DEFAULT_TYPE_ID stays 7045 "Incident"). Unset to skip tagging.
HDB_TAG_ID = "31974"

# Priority id used when a press is flagged "This is an emergency" (else DEFAULT_PRIORITY).
# PublicTicketPriority enum [0..4]; 1 is the top priority in the Gorelo UI ("Critical").
# Unset to always use DEFAULT_PRIORITY.
EMERGENCY_PRIORITY = "1"

# Ask Gorelo to send its "ticket created" email to the requester. "false" (default)
# never sends it. "true" sends it ONLY when the Worker resolved a real client contact
# — a press that falls back to the catch-all client (no contact match) never triggers
# the email, so it can't notify the wrong party.
SEND_TICKET_CREATED_EMAIL = "true"

# Verbose logging toggle. "false" (default) logs only non-PII breadcrumbs (method/path/
# status + resolved ids). Set "true" to log full HALO CAPTURE/RESPONSE bodies — which
# contain PII/PHI (names, emails, phones) — only for short debugging windows.
DEBUG_LOGS = "false"

# Bearer-token enforcement on the Halo resource endpoints (audit F1). Only takes
# effect when BOTH HALO_CLIENT_ID and HALO_CLIENT_SECRET secrets are set; the
# gate is skipped entirely otherwise, and /token is always exempt.
#   "off"     (DEFAULT) no token check — identical to legacy behavior.
#   "observe"          verify the Authorization: Bearer token and log a non-PII
#                      breadcrumb (present/missing/invalid/expired) — never rejects.
#   "enforce"          reject with 401 { "error": "invalid_token" } when the token
#                      is missing/invalid/expired on any non-/token resource.
# Rollout: deploy "off" -> switch to "observe" and confirm from breadcrumbs that
# real Tier2 traffic round-trips a valid token -> only then set "enforce".
# Per-product (issue #51): the gate is applied against the MATCHED product's own
# credential pair, so with per-product creds set, "enforce" works with multiple
# products at once — each authenticates with its own client_id/secret.
HALO_TOKEN_ENFORCE = "enforce"

# Non-secret per-product OAuth client_ids (the client_secret goes in via `wrangler
# secret put` — see below). The client_id is a public identifier, so it can live
# here. Uncomment/fill per enabled product; both the id AND the secret must resolve
# for that product to be validated + token-enforced (else it stays lenient).
#   HALO_CLIENT_ID          — tier2's client_id (its var is un-suffixed; secret is HALO_CLIENT_SECRET)
#   HALO_CLIENT_ID_HUNTRESS — Huntress's client_id (e.g. "13b3832f9306b677fb72eea412da5df7")
# Generate a pair + push the secret with:  ./scripts/halo-cred.sh <product>
# HALO_CLIENT_ID_HUNTRESS = "13b3832f9306b677fb72eea412da5df7"

# --- Secrets (set via CLI, never committed) ---
#   wrangler secret put GORELO_API_KEY      # X-API-Key for Gorelo (ticket write + asset/contact/client read scopes)
#   wrangler secret put ADMIN_KEY           # gates POST /admin/sync (X-Admin-Key / X-API-Key / Authorization: Bearer)
#   wrangler secret put NOTIFLY_URLS        # optional: notifly (Apprise) URL(s) alerted when a ticket is dead-lettered
#                                           #   e.g. "ntfy://alerts" | Teams Workflows "workflows://…&sig=…" — comma/space separated
# Per-product Halo mock OAuth secrets (issue #51) — one client_secret per product,
# paired with the client_id var above. Easiest: ./scripts/halo-cred.sh <product>
#   wrangler secret put HALO_CLIENT_SECRET          # tier2's client_secret (validated with HALO_CLIENT_ID)
#   wrangler secret put HALO_CLIENT_SECRET_HUNTRESS # Huntress's client_secret (validated with HALO_CLIENT_ID_HUNTRESS)

# --- D1 ---
# Create once:  wrangler d1 create tier2tickets-relay
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "tier2tickets-relay"
database_id = "fe2efa6c-f7d4-439b-adfd-3dc10ee0caa5"
migrations_dir = "migrations"
